    <style>
        /* ===== RESET & BASE ===== */
        *, *::before, *::after {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        html {
            font-size: 18px;
            scroll-behavior: smooth;
        }

        body {
            font-family: Impact, 'Impact', system-ui, -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', sans-serif;
            background: #000;
            color: #fff;
            line-height: 1.2;
            -webkit-font-smoothing: antialiased;
            overflow-x: hidden;
        }

        /* ===== LAYOUT TOKENS ===== */
        :root {
            --gap: 48px;
            --padding: 72px;
            --section-gap: 120px;
            --accent: #ff3b00;
            --border-w: 3px;
            --border-w-heavy: 4px;
        }

        /* ===== TYPOGRAPHY ===== */
        h1, h2, h3, h4 {
            font-weight: 700;
            text-transform: uppercase;
            letter-spacing: -0.02em;
            line-height: 0.95;
        }

        h1 {
            font-size: clamp(3.5rem, 12vw, 6rem);
            margin-bottom: var(--gap);
        }

        h2 {
            font-size: clamp(2.8rem, 8vw, 4rem);
            margin-bottom: var(--gap);
        }

        h3 {
            font-size: clamp(2rem, 5vw, 2.8rem);
        }

        p, li {
            font-family: system-ui, -apple-system, 'Segoe UI', Roboto, sans-serif;
            font-weight: 400;
            line-height: 1.5;
            font-size: 1.1rem;
        }

        a {
            color: var(--accent);
            text-decoration: none;
            border-bottom: var(--border-w) solid currentColor;
            transition: all 0.1s ease;
        }

        a:hover {
            background: var(--accent);
            color: #000;
        }

        /* ===== BRUTALIST UTILITIES ===== */
        .skew-left {
            transform: rotate(-1.5deg) skewX(-2deg);
            display: inline-block;
        }

        .skew-right {
            transform: rotate(1.5deg) skewX(2deg);
            display: inline-block;
        }

        .border-raw {
            border: var(--border-w-heavy) solid var(--accent);
            padding: 16px 24px;
        }

        .border-raw-thin {
            border: var(--border-w) solid #fff;
            padding: 12px 20px;
        }

        .negative-margin {
            margin-left: -4vw;
            margin-right: -2vw;
        }

        .bg-accent {
            background: var(--accent);
            color: #000;
        }

        .bg-black {
            background: #000;
            color: #fff;
        }

        .text-outline {
            -webkit-text-stroke: 2px var(--accent);
            color: transparent;
            text-shadow: 8px 8px 0 rgba(255,59,0,0.2);
        }

        /* ===== SECTIONING ===== */
        section {
            padding: var(--padding) var(--padding);
            position: relative;
        }

        section + section {
            margin-top: var(--section-gap);
        }

        .container-full {
            max-width: none;
            width: 100%;
        }

        .container-narrow {
            max-width: 1200px;
            margin: 0 auto;
            padding: 0 var(--padding);
        }

        /* ===== HEADER ===== */
        header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 24px var(--padding);
            border-bottom: var(--border-w-heavy) solid var(--accent);
            background: #000;
            position: sticky;
            top: 0;
            z-index: 1000;
        }

        .logo {
            font-size: 2.2rem;
            font-weight: 700;
            letter-spacing: -2px;
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .logo span {
            color: var(--accent);
        }

        .logo img, .logo svg {
            width: 48px;
            height: 48px;
        }

        /* navigation */
        nav {
            display: flex;
            align-items: center;
            gap: 32px;
        }

        nav a {
            font-family: system-ui, sans-serif;
            font-weight: 600;
            text-transform: uppercase;
            font-size: 0.9rem;
            border-bottom: none;
            padding: 8px 0;
            position: relative;
        }

        nav a::after {
            content: '';
            display: block;
            height: var(--border-w);
            background: var(--accent);
            transform: scaleX(0);
            transition: transform 0.2s;
            transform-origin: left;
        }

        nav a:hover::after {
            transform: scaleX(1);
        }

        .phone-link {
            font-family: Impact, system-ui, sans-serif;
            font-size: 1.6rem;
            color: var(--accent);
            border: var(--border-w) solid var(--accent);
            padding: 8px 24px;
            transition: 0.15s;
            white-space: nowrap;
        }

        .phone-link:hover {
            background: var(--accent);
            color: #000;
        }

        /* hamburger */
        .hamburger {
            display: none;
            flex-direction: column;
            gap: 6px;
            background: none;
            border: none;
            cursor: pointer;
            padding: 8px;
        }

        .hamburger span {
            display: block;
            width: 32px;
            height: 4px;
            background: #fff;
            border-radius: 0;
            transition: 0.3s;
        }

        .hamburger.active span:nth-child(1) {
            transform: rotate(45deg) translate(7px, 7px);
        }
        .hamburger.active span:nth-child(2) {
            opacity: 0;
        }
        .hamburger.active span:nth-child(3) {
            transform: rotate(-45deg) translate(7px, -7px);
        }

        /* mobile nav */
        @media (max-width: 768px) {
            :root {
                --padding: 36px;
                --gap: 28px;
                --section-gap: 80px;
            }

            header {
                padding: 16px var(--padding);
            }

            .hamburger {
                display: flex;
            }

            nav {
                display: none;
                flex-direction: column;
                position: absolute;
                top: 100%;
                left: 0;
                right: 0;
                background: #000;
                padding: 32px var(--padding);
                border-bottom: var(--border-w-heavy) solid var(--accent);
                gap: 20px;
                align-items: stretch;
            }

            nav.open {
                display: flex;
            }

            nav a {
                font-size: 1.4rem;
                border-bottom: var(--border-w) solid #222;
                padding: 12px 0;
            }

            .phone-link {
                font-size: 1.4rem;
                text-align: center;
            }

            .logo {
                font-size: 1.6rem;
            }
        }

        /* ===== HERO ===== */
        .hero {
            padding-top: 100px;
            padding-bottom: 100px;
            position: relative;
            overflow: hidden;
            min-height: 70vh;
            display: flex;
            align-items: center;
            background: #000;
        }

        .hero::before {
            content: '';
            position: absolute;
            inset: 0;
            background: repeating-linear-gradient(
                45deg,
                transparent,
                transparent 40px,
                rgba(255,59,0,0.03) 40px,
                rgba(255,59,0,0.03) 80px
            );
            pointer-events: none;
        }

        .hero-content {
            position: relative;
            z-index: 2;
            width: 100%;
        }

        .hero h1 {
            margin-bottom: 24px;
            font-size: clamp(4rem, 14vw, 7rem);
            line-height: 0.9;
        }

        .hero h1 .accent-block {
            display: block;
            color: var(--accent);
            -webkit-text-stroke: 3px var(--accent);
            text-stroke: 3px var(--accent);
            color: transparent;
            margin-left: -8vw;
        }

        .hero-sub {
            font-size: 1.6rem;
            font-family: system-ui, sans-serif;
            font-weight: 300;
            max-width: 60%;
            margin-bottom: var(--gap);
            margin-top: calc(var(--gap) * -0.5);
            background: rgba(0,0,0,0.7);
            padding: 16px 24px;
            border-left: var(--border-w-heavy) solid var(--accent);
        }

        .hero-cta {
            display: flex;
            gap: 32px;
            align-items: center;
            flex-wrap: wrap;
        }

        .hero-cta .big-phone {
            font-size: 2.4rem;
            font-weight: 700;
            background: var(--accent);
            color: #000;
            padding: 16px 48px;
            border: none;
            transition: 0.1s;
            display: inline-block;
        }

        .hero-cta .big-phone:hover {
            background: #fff;
            color: #000;
            transform: scale(0.98);
        }

        .hero-badge {
            border: var(--border-w) solid #fff;
            padding: 12px 32px;
            font-size: 1.2rem;
            transform: rotate(1deg);
            font-family: system-ui, sans-serif;
            font-weight: 600;
        }

        @media (max-width: 768px) {
            .hero {
                min-height: 60vh;
                padding-top: 60px;
                padding-bottom: 60px;
            }
            .hero-sub {
                max-width: 100%;
                font-size: 1.2rem;
            }
            .hero-cta {
                flex-direction: column;
                align-items: flex-start;
            }
            .hero-cta .big-phone {
                font-size: 1.6rem;
                padding: 14px 32px;
                width: 100%;
                text-align: center;
            }
            .hero h1 .accent-block {
                margin-left: -2vw;
            }
        }

        /* ===== BLOG POST ===== */
        .blog-post {
            background: #0a0a0a;
            border-top: var(--border-w-heavy) solid var(--accent);
            border-bottom: var(--border-w-heavy) solid var(--accent);
        }

        .blog-post .post-meta {
            display: flex;
            gap: 24px;
            font-family: system-ui, sans-serif;
            color: #888;
            font-size: 0.9rem;
            border-bottom: var(--border-w) solid #222;
            padding-bottom: 16px;
            margin-bottom: 32px;
            text-transform: uppercase;
        }

        .blog-post article p {
            margin-bottom: 1.8rem;
            max-width: 800px;
        }

        .blog-post article blockquote {
            border-left: 6px solid var(--accent);
            padding: 24px 32px;
            margin: 48px 0;
            background: #111;
            font-style: italic;
            font-size: 1.3rem;
        }

        .blog-post ul {
            list-style: none;
            margin: 32px 0;
        }

        .blog-post ul li {
            padding: 12px 0;
            border-bottom: 1px solid #222;
            display: flex;
            gap: 16px;
            align-items: baseline;
        }

        .blog-post ul li::before {
            content: '▸';
            color: var(--accent);
            font-size: 1.4rem;
        }

        .blog-post .data-highlight {
            display: inline-block;
            background: var(--accent);
            color: #000;
            padding: 4px 16px;
            font-weight: 700;
            font-size: 1.1rem;
        }

        /* ===== REVIEWS ===== */
        .reviews-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(300px, 1fr));
            gap: var(--gap);
            margin-top: var(--gap);
        }

        .review-card {
            background: #0f0f0f;
            border: var(--border-w-heavy) solid #fff;
            padding: 40px 32px;
            position: relative;
            transition: 0.1s;
        }

        .review-card:hover {
            border-color: var(--accent);
        }

        .review-card .stars {
            color: var(--accent);
            font-size: 1.8rem;
            letter-spacing: 4px;
            margin-bottom: 16px;
        }

        .review-card blockquote {
            font-family: system-ui, sans-serif;
            font-size: 1.1rem;
            line-height: 1.5;
            margin-bottom: 24px;
        }

        .review-card .reviewer {
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-top: var(--border-w) solid #333;
            padding-top: 16px;
            font-size: 0.95rem;
        }

        .review-card .reviewer .name {
            font-weight: 700;
            color: var(--accent);
        }

        .review-card .reviewer .date {
            color: #666;
            font-family: system-ui, sans-serif;
        }

        /* ===== CTA SECTION ===== */
        .cta-block {
            background: var(--accent);
            color: #000;
            text-align: center;
            padding: var(--padding) var(--padding);
            border-top: var(--border-w-heavy) solid #fff;
            border-bottom: var(--border-w-heavy) solid #fff;
        }

        .cta-block h2 {
            margin-bottom: 24px;
            font-size: 3.6rem;
        }

        .cta-block .cta-phone {
            font-size: 3rem;
            font-weight: 700;
            color: #000;
            border: var(--border-w-heavy) solid #000;
            padding: 16px 64px;
            display: inline-block;
            transition: 0.1s;
            background: #fff;
        }

        .cta-block .cta-phone:hover {
            background: #000;
            color: #fff;
        }

        /* ===== FOOTER ===== */
        footer {
            padding: 48px var(--padding);
            border-top: var(--border-w-heavy) solid var(--accent);
            display: flex;
            justify-content: space-between;
            align-items: center;
            flex-wrap: wrap;
            gap: 24px;
            background: #000;
            font-family: system-ui, sans-serif;
            font-size: 0.85rem;
        }

        footer .copyright {
            color: #666;
        }

        footer .footer-links {
            display: flex;
            gap: 32px;
        }

        footer .footer-links a {
            border-bottom: none;
            color: #aaa;
        }

        footer .footer-links a:hover {
            color: var(--accent);
        }

        @media (max-width: 768px) {
            footer {
                flex-direction: column;
                text-align: center;
            }
            .cta-block h2 {
                font-size: 2.2rem;
            }
            .cta-block .cta-phone {
                font-size: 1.8rem;
                padding: 12px 32px;
                width: 100%;
            }
        }

        /* ===== UTILITIES ===== */
        .gap-section {
            height: var(--section-gap);
            background: #000;
            border-top: 1px solid #111;
            border-bottom: 1px solid #111;
        }

        .svg-icon {
            width: 1.2em;
            height: 1.2em;
            vertical-align: middle;
            fill: currentColor;
        }

        hr {
            border: none;
            border-top: var(--border-w) solid #222;
            margin: var(--gap) 0;
        }

        /* ===== OVERRIDE BROWSER DEFAULTS ===== */
        ::selection {
            background: var(--accent);
            color: #000;
        }
    </style>
</head>
